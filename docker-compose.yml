services:

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - rabbitmq
      - cache
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  db:
    image: postgres:18.2
    restart: always
    shm_size: 128mb
    ports:
      - '5432:5432'

    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: leadray
      POSTGRES_DB: leadray
  cache:
    image: redis:8.6.0-alpine
    restart: always
    ports:
      - '6379:6379'
  rabbitmq:
      image: rabbitmq:management
      container_name: rabbitmq
      ports:
        - "5672:5672"
        - "15672:15672"
      healthcheck:
        test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
        interval: 10s
        timeout: 3s
        retries: 5

  worker:
      build: .
      restart: always
      volumes:
        - .:/app
      env_file:
        - .env
      environment:
        - PYTHONPATH=/app
      depends_on:
        db:
          condition: service_started
        rabbitmq:
          condition: service_healthy
      command: celery -A app.core.celery_app worker --loglevel=info